<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeuCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2026;
      --border: #2a2d35;
      --green: #22c55e;
      --green-dim: #166534;
      --text: #f1f5f9;
      --muted: #64748b;
      --accent: #3b82f6;
      --sent: #1d4ed8;
      --received: #1e2026;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .logo span { color: var(--green); }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
    }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon { color: var(--muted); font-size: 14px; }

    .contacts-list { overflow-y: auto; flex: 1; }
    .contacts-list::-webkit-scrollbar { width: 4px; }
    .contacts-list::-webkit-scrollbar-track { background: transparent; }
    .contacts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .contact-item:hover { background: var(--surface2); }
    .contact-item.active { background: var(--surface2); border-left: 2px solid var(--green); }

    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--green-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
      color: var(--green);
      flex-shrink: 0;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-preview { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .contact-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .contact-time { font-size: 10px; color: var(--muted); }
    .unread-badge {
      background: var(--green);
      color: #000;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .empty-contacts {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .avatar { width: 34px; height: 34px; font-size: 13px; }
    .chat-contact-name { font-size: 14px; font-weight: 500; }
    .chat-contact-phone { font-size: 11px; color: var(--muted); }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      max-width: 65%;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .message.received {
      background: var(--received);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.sent {
      background: var(--sent);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message-time { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .message.sent .message-time { text-align: right; }

    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
    }
    .empty-chat-icon { font-size: 40px; opacity: 0.3; }
    .empty-chat-text { font-size: 14px; }

    .no-contact {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--muted);
    }
    .no-contact-icon { font-size: 48px; opacity: 0.15; }
    .no-contact-text { font-size: 15px; }
    .no-contact-sub { font-size: 12px; opacity: 0.6; }

    /* ── Input Area ── */
    .input-area {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.15s;
    }
    .message-input:focus { border-color: var(--accent); }
    .message-input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 10px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Config Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 440px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 14px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btn {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .modal-btn:hover { opacity: 0.9; }

    .loading { color: var(--muted); font-size: 12px; padding: 20px; text-align: center; }
  </style>
</head>
<body>

<!-- Config Modal -->
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙️ Configurar MeuCRM</h2>
    <p>Cole a URL do seu servidor Railway para conectar à interface. Você só precisa fazer isso uma vez.</p>
    <label>URL do servidor (Railway)</label>
    <input type="text" id="serverUrl" placeholder="https://meucrm-backend-production-d4f4.up.railway.app" />
    <button class="modal-btn" onclick="saveConfig()">Conectar →</button>
  </div>
</div>

<!-- App -->
<header>
  <div class="logo">Meu<span>CRM</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:12px;color:var(--muted)" id="serverLabel"></span>
    <div class="status-dot"></div>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Conversas</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Buscar contato..." id="searchInput" oninput="filterContacts()" />
      </div>
    </div>
    <div class="contacts-list" id="contactsList">
      <div class="loading">Carregando contatos...</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="no-contact">
      <div class="no-contact-icon">💬</div>
      <div class="no-contact-text">Selecione uma conversa</div>
      <div class="no-contact-sub">Suas mensagens do WhatsApp aparecerão aqui</div>
    </div>
  </div>
</div>

<script>
  let SERVER_URL = '';
  let contacts = [];
  let activePhone = null;
  let refreshInterval = null;

  // ── Config ──
  function saveConfig() {
    const url = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
    if (!url.startsWith('http')) return alert('Cole a URL completa começando com https://');
    SERVER_URL = url;
    localStorage.setItem('meucrm_server', url);
    document.getElementById('configModal').style.display = 'none';
    document.getElementById('serverLabel').textContent = url.replace('https://', '');
    loadContacts();
    refreshInterval = setInterval(loadContacts, 10000);
  }

  // ── Load on start ──
  window.onload = () => {
    const saved = localStorage.getItem('meucrm_server');
    if (saved) {
      SERVER_URL = saved;
      document.getElementById('serverUrl').value = saved;
      document.getElementById('serverLabel').textContent = saved.replace('https://', '');
      document.getElementById('configModal').style.display = 'none';
      loadContacts();
      refreshInterval = setInterval(loadContacts, 10000);
    }
  };

  // ── Fetch contacts ──
  async function loadContacts() {
    try {
      const res = await fetch(`${SERVER_URL}/contacts`);
      const data = await res.json();
      contacts = data;
      renderContacts(data);
    } catch (e) {
      document.getElementById('contactsList').innerHTML =
        '<div class="empty-contacts">❌ Não foi possível conectar ao servidor.<br>Verifique a URL nas configurações.</div>';
    }
  }

  function renderContacts(list) {
    const el = document.getElementById('contactsList');
    if (!list.length) {
      el.innerHTML = '<div class="empty-contacts">Nenhuma conversa ainda.<br>Envie uma mensagem pelo WhatsApp para o número de teste.</div>';
      return;
    }
    el.innerHTML = list.map(c => `
      <div class="contact-item ${c.phone === activePhone ? 'active' : ''}" onclick="openChat('${c.phone}', '${(c.name||c.phone).replace(/'/g,"\\'")}')">
        <div class="avatar">${(c.name || c.phone)[0].toUpperCase()}</div>
        <div class="contact-info">
          <div class="contact-name">${c.name || c.phone}</div>
          <div class="contact-preview">${c.phone}</div>
        </div>
        <div class="contact-meta">
          <div class="contact-time">${formatTime(c.last_message_at || c.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  function filterContacts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = contacts.filter(c =>
      (c.name||'').toLowerCase().includes(q) || c.phone.includes(q)
    );
    renderContacts(filtered);
  }

  // ── Open Chat ──
  async function openChat(phone, name) {
    activePhone = phone;
    renderContacts(contacts);

    document.getElementById('chatArea').innerHTML = `
      <div class="chat-header">
        <div class="avatar">${name[0].toUpperCase()}</div>
        <div>
          <div class="chat-contact-name">${name}</div>
          <div class="chat-contact-phone">${phone}</div>
        </div>
      </div>
      <div class="messages-area" id="messagesArea">
        <div class="loading">Carregando mensagens...</div>
      </div>
      <div class="input-area">
        <textarea class="message-input" id="msgInput" rows="1" placeholder="Digite uma mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">➤</button>
      </div>
    `;

    loadMessages(phone);
  }

  async function loadMessages(phone) {
    try {
      const res = await fetch(`${SERVER_URL}/messages/${phone}`);
      const data = await res.json();
      const area = document.getElementById('messagesArea');
      if (!area) return;

      if (!data.length) {
        area.innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div><div class="empty-chat-text">Nenhuma mensagem ainda</div></div>';
        return;
      }

      area.innerHTML = data.map(m => `
        <div class="message ${m.direction === 'outbound' ? 'sent' : 'received'}">
          ${m.content}
          <div class="message-time">${formatTime(m.timestamp || m.created_at)}</div>
        </div>
      `).join('');
      area.scrollTop = area.scrollHeight;
    } catch(e) {
      console.error(e);
    }
  }

  // ── Send ──
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const msg = input?.value.trim();
    if (!msg || !activePhone) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    // Mostra na tela imediatamente
    const area = document.getElementById('messagesArea');
    if (area) {
      const div = document.createElement('div');
      div.className = 'message sent';
      div.innerHTML = `${msg}<div class="message-time">agora</div>`;
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    try {
      await fetch(`${SERVER_URL}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: activePhone, message: msg })
      });
    } catch(e) {
      console.error('Erro ao enviar:', e);
    }

    document.getElementById('sendBtn').disabled = false;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Helpers ──
  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'agora';
    if (diff < 3600000) return `${Math.floor(diff/60000)}min`;
    if (diff < 86400000) return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
  }
</script>
</body>
</html>
